name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Lint · PHPStan · PHPCS
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          tools: composer:v2
          extensions: intl, mbstring, json, mysqli, pdo_mysql

      - name: Validate composer.json
        run: composer validate --strict --no-check-publish

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Lint PHP syntax
        run: |
          find app tests -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l > /dev/null

      - name: PHPCS (PSR-12 + Slevomat)
        run: vendor/bin/phpcs --no-cache --colors -q

      - name: PHPStan Level 8
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  tests:
    name: PHPUnit (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ci_test
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot"
          --health-interval=5s --health-timeout=5s --health-retries=10
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: pcov
          tools: composer:v2
          extensions: intl, mbstring, json, mysqli, pdo_mysql, pcov

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.cache/composer
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Configure environment
        run: |
          cp env .env || true
          echo "database.default.hostname = 127.0.0.1" >> .env
          echo "database.default.database = ci_test"   >> .env
          echo "database.default.username = root"      >> .env
          echo "database.default.password = root"      >> .env
          echo "database.default.DBDriver = MySQLi"    >> .env

      - name: Run migrations
        run: php spark migrate --all || true

      - name: PHPUnit with coverage
        run: vendor/bin/phpunit --coverage-text --coverage-clover=coverage.xml

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          if-no-files-found: ignore
