# deptrac.yaml — architectural boundary enforcement.
#
# Layers are defined top-down: Domain at the bottom (zero dependencies),
# Infrastructure in the middle (may depend on Domain), Controllers at the
# top (may depend on either). Configs and Database scripts are framework
# leaves and don't participate in the dependency graph.
#
# Running:
#   composer deptrac           # check, report violations
#   composer deptrac:baseline  # snapshot current violations (use sparingly)
#
# Why this matters for AI-first:
#   AIs make boundary mistakes silently — they'll import a CodeIgniter
#   service from inside Domain code because "it's available." This file
#   makes those mistakes loud at CI time. Every violation is a real
#   architectural bug the project's CQRS+DDD design intentionally bans.
deptrac:
  paths:
    - ./app
    - ./tests/Unit
  exclude_files:
    # Production source still excludes the framework's case-folded test
    # scaffolding (`tests/_*`, lowercase `tests/database`,
    # `tests/session`, `tests/unit`). Note the regex is
    # CASE-SENSITIVE: our PascalCase `tests/Unit/...` participates so
    # the LoggerFactory-in-unit-tests rule below can be enforced. The
    # framework's lowercase `tests/unit/` shipped with CodeIgniter
    # template still does not.
    - '#tests/(_skipped|_support|database|session|unit)/#'
    # tests/Integration and tests/Feature also stay out of deptrac —
    # they legitimately depend on the real Infrastructure layer
    # (Database connections, JWT services, etc.).
    - '#tests/(Integration|Feature)/#'
  layers:
    - name: Domain
      collectors:
        - type: bool
          must:
            - type: directory
              value: app/Domain/.*
          must_not:
            - type: attribute
              value: App\Infrastructure\Attributes\InfrastructureAdapter
            - type: attribute
              value: App\Infrastructure\Attributes\DomainServiceProvider
    - name: Infrastructure
      collectors:
        # All app/Infrastructure code EXCEPT LoggerFactory itself, which
        # moves into its own ForbiddenInUnitTests layer so a single
        # deptrac rule can forbid tests/Unit from importing it without
        # exempting all of Infrastructure. The 16 production-side
        # consumers stay legal via the Infrastructure ruleset's explicit
        # `ForbiddenInUnitTests` entry below.
        - type: bool
          must:
            - type: directory
              value: app/Infrastructure/.*
          must_not:
            - type: classLike
              value: ^App\\Infrastructure\\Logging\\LoggerFactory$
        - type: attribute
          value: App\Infrastructure\Attributes\InfrastructureAdapter
        - type: attribute
          value: App\Infrastructure\Attributes\DomainServiceProvider
    - name: Controllers
      collectors:
        - type: directory
          value: app/Controllers/.*
    - name: Models
      collectors:
        - type: directory
          value: app/Models/.*
    - name: Libraries
      collectors:
        - type: directory
          value: app/Libraries/.*
    - name: Commands
      collectors:
        - type: directory
          value: app/Commands/.*
    - name: Config
      collectors:
        - type: directory
          value: app/Config/.*
    - name: Database
      collectors:
        - type: directory
          value: app/Database/.*
    - name: Filters
      collectors:
        - type: directory
          value: app/Filters/.*
    - name: Helpers
      collectors:
        - type: directory
          value: app/Helpers/.*
    # Tests under tests/Unit. They are unit-test ONLY and must not
    # touch the real filesystem; in particular, importing
    # App\Infrastructure\Logging\LoggerFactory pushes a
    # RotatingFileHandler onto a real `writable/logs/app.json` and
    # turns every test into an integration test. The ruleset block
    # below makes that a deptrac violation. Closes audit slice 12/F1
    # (the "no filesystem dependency in unit tests" rule).
    - name: TestsUnit
      collectors:
        - type: directory
          value: tests/Unit/.*
    - name: ForbiddenInUnitTests
      collectors:
        - type: classLike
          value: ^App\\Infrastructure\\Logging\\LoggerFactory$
    - name: Views
      collectors:
        - type: directory
          value: app/Views/.*
    - name: CodeIgniterFramework
      collectors:
        - type: classLike
          value: ^CodeIgniter\\.*
  ruleset:
    # The CRITICAL rule: domain code is dependency-free except on itself
    # and the bare PHP / interface stubs it declares. NO framework
    # imports, NO infrastructure imports, NOT EVEN Config.
    Domain: []

    # Infrastructure implements domain ports + uses framework primitives.
    # `ForbiddenInUnitTests` is added here so the 16 legitimate
    # production consumers of LoggerFactory (handlers, services, the
    # event dispatcher) compile. The ban is enforced one layer up at
    # TestsUnit, which does NOT include ForbiddenInUnitTests in its
    # allow-list.
    Infrastructure:
      - Domain
      - CodeIgniterFramework
      - Models
      - Libraries
      - Config
      - ForbiddenInUnitTests

    # Controllers orchestrate: they call infrastructure adapters with
    # domain values to fulfil HTTP requests.
    Controllers:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Models
      - Libraries
      - Filters
      - Helpers
      - Config

    # CodeIgniter Model subclasses (active record gateways used by the
    # repository adapters). They sit beside Infrastructure in the
    # dependency graph and may map rows into Domain types.
    Models:
      - CodeIgniterFramework
      - Config
      - Domain

    # Spark CLI commands wire infrastructure + domain to do scheduled
    # background work (outbox relay, projection rebuild, etc.).
    Commands:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Models
      - Config
      - ForbiddenInUnitTests

    # Filters intercept HTTP requests before they hit controllers.
    Filters:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Config

    # Config: project-wide app config (CodeIgniter only).
    Config:
      - CodeIgniterFramework
      - Domain
      - Infrastructure
      - ForbiddenInUnitTests

    # Database migrations + seeds. Framework-bound.
    Database:
      - CodeIgniterFramework
      - Domain
      - Infrastructure
      - Config

    # Helpers + Libraries are leaf utilities.
    Helpers:
      - CodeIgniterFramework
      - Config
    Libraries:
      - CodeIgniterFramework
      - Config

    # Views render HTML; should call no PHP code beyond framework helpers.
    Views:
      - CodeIgniterFramework
      - Config
    # Unit tests are explicitly forbidden from importing
    # LoggerFactory — see the TestsUnit / ForbiddenInUnitTests
    # collectors above. Use a Monolog Logger + TestHandler instead
    # (memory-only, no filesystem). Direct domain/infrastructure
    # mocks and PHPUnit's built-ins remain allowed.
    TestsUnit:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Models
      - Libraries
      - Config
      - Helpers
    # LoggerFactory itself sits in this layer (see collector). It
    # must still be allowed to depend on its sibling Infrastructure
    # classes (RedactingProcessor, CorrelationIdService) — those are
    # implementation details of the factory. The ban is enforced
    # downstream: no TestsUnit module may depend on ForbiddenInUnitTests
    # (see the TestsUnit allow-list above, which intentionally omits
    # this layer).
    ForbiddenInUnitTests:
      - Infrastructure
      - CodeIgniterFramework
  skip_violations:
    # Helpers are infrastructure glue; these violations are permanent and intentional.
    can():
      - App\Domain\Shared\ValueObjects\Permission
    # Helpers are infrastructure glue; these violations are permanent and intentional.
    current_actor():
      - App\Domain\Shared\ValueObjects\Actor
      - App\Infrastructure\Auth\Services\ActorResolver
    # LoggerFactoryTest is the ONE unit test that legitimately
    # imports LoggerFactory — its raison d'etre is to pin the
    # factory's public contract (handler shape, processors order,
    # JSON formatting). All OTHER unit tests under tests/Unit are
    # caught by the ForbiddenInUnitTests rule.
    Tests\Unit\Infrastructure\Logging\LoggerFactoryTest:
      - App\Infrastructure\Logging\LoggerFactory
