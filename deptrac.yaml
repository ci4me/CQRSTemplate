# deptrac.yaml — architectural boundary enforcement.
#
# Layers are defined top-down: Domain at the bottom (zero dependencies),
# Infrastructure in the middle (may depend on Domain), Controllers at the
# top (may depend on either). Configs and Database scripts are framework
# leaves and don't participate in the dependency graph.
#
# Running:
#   composer deptrac           # check, report violations
#   composer deptrac:baseline  # snapshot current violations (use sparingly)
#
# Why this matters for AI-first:
#   AIs make boundary mistakes silently — they'll import a CodeIgniter
#   service from inside Domain code because "it's available." This file
#   makes those mistakes loud at CI time. Every violation is a real
#   architectural bug the project's CQRS+DDD design intentionally bans.
deptrac:
  paths:
    - ./app
  exclude_files:
    - '#.*test.*#i'
  layers:
    - name: Domain
      collectors:
        - type: bool
          must:
            - type: directory
              value: app/Domain/.*
          must_not:
            - type: attribute
              value: App\Infrastructure\Attributes\InfrastructureAdapter
    - name: Infrastructure
      collectors:
        - type: directory
          value: app/Infrastructure/.*
        - type: attribute
          value: App\Infrastructure\Attributes\InfrastructureAdapter
    - name: Controllers
      collectors:
        - type: directory
          value: app/Controllers/.*
    - name: Models
      collectors:
        - type: directory
          value: app/Models/.*
    - name: Libraries
      collectors:
        - type: directory
          value: app/Libraries/.*
    - name: Commands
      collectors:
        - type: directory
          value: app/Commands/.*
    - name: Config
      collectors:
        - type: directory
          value: app/Config/.*
    - name: Database
      collectors:
        - type: directory
          value: app/Database/.*
    - name: Filters
      collectors:
        - type: directory
          value: app/Filters/.*
    - name: Helpers
      collectors:
        - type: directory
          value: app/Helpers/.*
    - name: Views
      collectors:
        - type: directory
          value: app/Views/.*
    - name: CodeIgniterFramework
      collectors:
        - type: classLike
          value: ^CodeIgniter\\.*
  ruleset:
    # The CRITICAL rule: domain code is dependency-free except on itself
    # and the bare PHP / interface stubs it declares. NO framework
    # imports, NO infrastructure imports, NOT EVEN Config.
    Domain: []

    # Infrastructure implements domain ports + uses framework primitives.
    Infrastructure:
      - Domain
      - CodeIgniterFramework
      - Models
      - Libraries
      - Config

    # Controllers orchestrate: they call infrastructure adapters with
    # domain values to fulfil HTTP requests.
    Controllers:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Models
      - Libraries
      - Filters
      - Helpers
      - Config

    # CodeIgniter Model subclasses (active record gateways used by the
    # repository adapters). They sit beside Infrastructure in the
    # dependency graph and may map rows into Domain types.
    Models:
      - CodeIgniterFramework
      - Config
      - Domain

    # Spark CLI commands wire infrastructure + domain to do scheduled
    # background work (outbox relay, projection rebuild, etc.).
    Commands:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Models
      - Config

    # Filters intercept HTTP requests before they hit controllers.
    Filters:
      - Domain
      - Infrastructure
      - CodeIgniterFramework
      - Config

    # Config: project-wide app config (CodeIgniter only).
    Config:
      - CodeIgniterFramework
      - Domain
      - Infrastructure

    # Database migrations + seeds. Framework-bound.
    Database:
      - CodeIgniterFramework
      - Domain
      - Infrastructure
      - Config

    # Helpers + Libraries are leaf utilities.
    Helpers:
      - CodeIgniterFramework
      - Config
    Libraries:
      - CodeIgniterFramework
      - Config

    # Views render HTML; should call no PHP code beyond framework helpers.
    Views:
      - CodeIgniterFramework
      - Config
  skip_violations:
    App\Domain\Cookie\CookieServiceProvider:
      - App\Infrastructure\Attributes\DomainServiceProvider
      - App\Infrastructure\Bus\CommandBus
      - App\Infrastructure\Bus\EventDispatcher
      - App\Infrastructure\Bus\QueryBus
      - App\Infrastructure\Logging\LoggerFactory
      - App\Infrastructure\ServiceProvider\DomainServiceProviderInterface
      - CodeIgniter\Router\RouteCollection
      - Config\Logging
    App\Domain\Cookie\Queries\GetAllCookies\GetAllCookiesHandler:
      - Config\Logging
    App\Domain\Cookie\Queries\GetCookieById\GetCookieByIdHandler:
      - Config\Logging
    App\Domain\Cookie\Queries\GetCookiesPaginated\GetCookiesPaginatedHandler:
      - Config\Logging
    App\Domain\User\Commands\ChangeUserPassword\ChangeUserPasswordHandler:
      - App\Infrastructure\Auth\Services\SessionManagementService
      - App\Domain\User\Repositories\PasswordHistoryRepository
    App\Domain\User\Commands\UpdateUser\UpdateUserHandler:
      - App\Infrastructure\Auth\Services\PermissionService
    App\Domain\User\Queries\GetAllUsers\GetAllUsersHandler:
      - Config\Logging
    App\Domain\User\Queries\GetUserByEmail\GetUserByEmailHandler:
      - Config\Logging
    App\Domain\User\Queries\GetUserById\GetUserByIdHandler:
      - Config\Logging
    App\Domain\User\Queries\SearchUsers\SearchUsersHandler:
      - Config\Logging
    App\Domain\User\UserServiceProvider:
      - App\Infrastructure\Attributes\DomainServiceProvider
      - App\Infrastructure\Bus\CommandBus
      - App\Infrastructure\Bus\EventDispatcher
      - App\Infrastructure\Bus\QueryBus
      - App\Domain\User\Repositories\PasswordHistoryRepository
      - App\Domain\User\Repositories\UserRepository
      - App\Infrastructure\ServiceProvider\DomainServiceProviderInterface
      - CodeIgniter\Router\RouteCollection
      - Config\Logging
      - Config\Services
    # Helpers are infrastructure glue; these violations are permanent and intentional.
    can():
      - App\Domain\Shared\ValueObjects\Permission
    # Helpers are infrastructure glue; these violations are permanent and intentional.
    current_actor():
      - App\Domain\Shared\ValueObjects\Actor
      - App\Infrastructure\Auth\Services\ActorResolver
